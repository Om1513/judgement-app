# Render blueprint. Deploys the game server (Docker) + a managed Postgres DB.
# Import via Render dashboard -> "New" -> "Blueprint" and point at this repo.
# Plan names below may need adjusting to currently-available Render plans.
services:
  - type: web
    name: judgement-server
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: starter
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: judgement-db
          property: connectionString

databases:
  - name: judgement-db
    plan: basic-256mb
    postgresMajorVersion: "16"
